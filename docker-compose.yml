version: '3.8'

services:
  transcoder:
    build: .
    container_name: media-transcoder
    ports:
      - "5001:5000"
    volumes:
      # Map the host media folder to the internal media directory (configurable via HOST_MEDIA_DIR)
      - ${HOST_MEDIA_DIR:-~/Movies/media}:/app/media
      # Map the persistence directory for SQLite storage
      - ./data:/app/data
    environment:
      - MEDIA_DIR=/app/media
      - DB_PATH=/app/data/db.sqlite
    restart: unless-stopped
