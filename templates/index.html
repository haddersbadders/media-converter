<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Media Explorer & Transcoder</title>
    <link rel="stylesheet" href="/static/css/style.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=JetBrains+Mono:wght@400;700&display=swap" rel="stylesheet">
</head>
<body>
    <div class="app-container">
        <!-- Header -->
        <header class="top-nav">
            <div class="logo">
                <span class="logo-icon">▲</span>
                <h1>ANTIGRAVITY CODES <span class="subtitle">| Media Explorer</span></h1>
            </div>
            <div class="system-status">
                <span id="scanProgress" style="display: none; margin-right: 15px; font-size: 0.85em; color: var(--accent-blue);">Scanning metadata: 0/0</span>
                <span class="status-indicator"></span>
                <span>System Online</span>
            </div>
        </header>

        <!-- Sub Header (Breadcrumbs & Search) -->
        <div class="sub-header">
            <div class="breadcrumbs" id="breadcrumbs">
                <!-- Breadcrumbs injected via JS -->
            </div>
            <div class="search-container">
                <input type="text" id="searchInput" placeholder="Search Files..." autocomplete="off">
            </div>
        </div>

        <!-- Tabs Navigation -->
        <div class="tabs-nav">
            <button class="tab-btn active" data-tab="tab-explorer">Media Explorer</button>
            <button class="tab-btn" data-tab="tab-queue">Queue & Monitor</button>
            <button class="tab-btn" data-tab="tab-transcoded">Transcoded Files</button>
        </div>

        <!-- Main Content Layout -->
        <main class="main-layout">
            <!-- Tab 1: Media Explorer -->
            <div id="tab-explorer" class="tab-pane active">
                <!-- Left Pane: File Explorer -->
                <section class="pane explorer-pane">
                    <div class="pane-header">
                        <h2>📂 DIRECTORIES & FILES</h2>
                        <div class="actions" style="display: flex; align-items: center; gap: 10px;">
                            <label style="display: flex; align-items: center; gap: 5px; font-size: 0.9em; cursor: pointer;">
                                <input type="checkbox" id="toggleFlatView"> Show All Files
                            </label>
                            <button id="btnUpLevel" class="icon-button" title="Up One Level">..</button>
                        </div>
                    </div>
                    <div class="file-list-container">
                        <div class="file-list-header" style="display: flex; padding: 0.5rem 1rem; border-bottom: 1px solid var(--border-color); color: var(--text-secondary); font-size: 0.85rem; font-weight: 600; text-transform: uppercase;">
                            <div style="width: 2rem; display: flex; justify-content: center; align-items: center; margin-right: 0.5rem;">
                                <input type="checkbox" id="selectAllCheckbox">
                            </div>
                            <div style="width: 1.25rem; margin-right: 1rem;"></div>
                            <div style="flex: 1; cursor: pointer; user-select: none;" id="sortName">Name ↕</div>
                            <div style="width: 100px; cursor: pointer; text-align: left; user-select: none;" id="sortCodec">Codec ↕</div>
                            <div style="width: 140px; cursor: pointer; text-align: right; user-select: none;" id="sortDate">Date ↕</div>
                            <div style="width: 100px; cursor: pointer; text-align: right; user-select: none;" id="sortSize">Size ↕</div>
                        </div>
                        <ul id="fileList" class="file-list">
                            <!-- Items injected via JS -->
                        </ul>
                    </div>
                </section>

                <!-- Right Pane: Details -->
                <section class="pane sidebar-pane">
                    <!-- Details Card -->
                    <div class="details-card glass-panel" id="detailsCard" style="display: none; flex: 1;">
                        <div class="pane-header">
                            <h2>⚙️ TRANSCODE CONSOLE</h2>
                        </div>
                        <div class="details-content">
                            <h3 id="selectedFilename" class="selected-filename">Select a file...</h3>
                            <p id="selectedFileStats" class="file-stats">---</p>
                            
                            <div class="preset-section">
                                <h4>Preset Profiles:</h4>
                                <ul class="preset-list">
                                    <li>
                                        <label class="radio-label">
                                            <input type="radio" name="preset" value="universal" checked>
                                            <span class="radio-custom"></span>
                                            Universal Web (H.264/AAC, MP4)
                                        </label>
                                    </li>
                                    <li>
                                        <label class="radio-label">
                                            <input type="radio" name="preset" value="spacesaver">
                                            <span class="radio-custom"></span>
                                            Space Saver (H.265/AAC, MP4)
                                        </label>
                                    </li>
                                    <li>
                                        <label class="radio-label">
                                            <input type="radio" name="preset" value="hq">
                                            <span class="radio-custom"></span>
                                            High Quality (CRF 18)
                                        </label>
                                    </li>
                                    <li>
                                        <label class="radio-label">
                                            <input type="radio" name="preset" value="audio_only">
                                            <span class="radio-custom"></span>
                                            Audio-Only (MP3)
                                        </label>
                                    </li>
                                </ul>
                                <div style="margin-top: 15px; padding-top: 15px; border-top: 1px solid rgba(255,255,255,0.1);">
                                    <label class="radio-label" style="display: flex; align-items: center; gap: 8px; cursor: pointer; font-weight: 500;">
                                        <input type="checkbox" id="useQSV" checked>
                                        Use Hardware Acceleration (Intel QSV)
                                    </label>
                                </div>
                            </div>
                            
                            <div class="actions-row">
                                <button id="btnTranscode" class="btn btn-primary">Transcode Now</button>
                            </div>
                        </div>
                    </div>
                </section>
            </div>

            <!-- Tab 2: Queue -->
            <div id="tab-queue" class="tab-pane">
                <div class="queue-panel glass-panel" style="width: 100%; height: 100%;">
                    <div class="pane-header">
                        <h2>📊 ACTIVE QUEUE & MONITOR</h2>
                    </div>
                    <div class="queue-list" id="queueList">
                        <!-- Queue items injected via JS -->
                    </div>
                </div>
            </div>
            <!-- Tab 3: Transcoded Files -->
            <div id="tab-transcoded" class="tab-pane">
                <div class="transcoded-panel glass-panel" style="width: 100%; height: 100%;">
                    <div class="pane-header" style="display: flex; justify-content: space-between; align-items: center;">
                        <h2>✅ TRANSCODED FILES LIBRARY</h2>
                        <button id="btnRefreshTranscoded" class="btn-small">Refresh List</button>
                    </div>
                    <div class="transcoded-list" id="transcodedList" style="padding: 1rem; overflow-y: auto; height: calc(100% - 60px);">
                        <!-- Transcoded items injected via JS -->
                    </div>
                </div>
            </div>
        </main>
    </div>

    <script src="/static/js/app.js"></script>
</body>
</html>
